name: Build APK
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create root Gradle files
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TeddyWifiAuth"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF

          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME
          $HOME/gradle-8.1.1/bin/gradle wrapper --gradle-version 8.1.1

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TeddyWifiAuth-APK
          path: app/build/outputs/apk/debug/app-debug.apk
