name: Build APK
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create root Gradle files
        run: |
          echo "include ':app'" > settings.gradle

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME
          $HOME/gradle-8.1.1/bin/gradle wrapper --gradle-version 8.1.1

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: TeddyWifiAuth-APK
          path: app/build/outputs/apk/debug/app-debug.apk
